<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave a Review | McBride Construction Ltd</title>
<meta name="description" content="Leave a review for McBride Construction Ltd, Christchurch builders." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav nav--solid">
  <a href="index.html" class="nav__logo">McBride<b>.</b></a>
  <div class="nav__links">
    <a href="index.html#services">Services</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact" class="btn btn--primary">Get a quote</a>
  </div>
</nav>

<div class="review-stage">
  <span class="eyebrow">Your feedback</span>
  <h1 style="font-size:clamp(30px,5vw,46px);margin:14px 0 12px;">How did we do?</h1>
  <p class="review-note">Tap a star to rate your experience with McBride Construction. It only takes a moment.</p>

  <div class="star-picker" id="stars">
    <button data-rating="1" aria-label="1 star">★</button>
    <button data-rating="2" aria-label="2 stars">★</button>
    <button data-rating="3" aria-label="3 stars">★</button>
    <button data-rating="4" aria-label="4 stars">★</button>
    <button data-rating="5" aria-label="5 stars">★</button>
  </div>
  <p class="review-note" id="hint">Honest feedback helps us keep getting better.</p>
</div>

<footer class="footer">
  <div class="wrap">
    <div class="footer__bottom" style="border:0;padding-top:0;">
      <span>© <span id="year">2026</span> McBride Construction Ltd · Christchurch, NZ</span>
      <span><a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a></span>
    </div>
  </div>
</footer>

<script>
  // 4-5 stars -> Google review; 1-3 stars -> private feedback form
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER";
  var stars = document.querySelectorAll('#stars button');
  var hint = document.getElementById('hint');
  stars.forEach(function (btn) {
    btn.addEventListener('mouseenter', function () {
      var r = +btn.dataset.rating;
      stars.forEach(function (b, idx) { b.classList.toggle('lit', idx < r); });
    });
    btn.addEventListener('mouseleave', function () {
      stars.forEach(function (b) { b.classList.remove('lit'); });
    });
    btn.addEventListener('click', function () {
      var r = +btn.dataset.rating;
      stars.forEach(function (b, idx) { b.classList.toggle('lit', idx < r); });
      hint.textContent = r >= 4 ? 'Thanks! Taking you to Google…' : 'Thanks — we\'d love to hear more.';
      setTimeout(function () {
        if (r >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
        else { window.location.href = 'private.html?rating=' + r; }
      }, 500);
    });
  });
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
